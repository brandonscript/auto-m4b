name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit & integration tests (fast, required to merge) ───────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv + spaCy model
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/nltk_data
          key: venv-v3-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Download spaCy model
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry run python -m spacy download en_core_web_sm

      - name: Download NLTK data
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          poetry run python -c "
          import nltk
          nltk.download('words')
          nltk.download('webtext')
          nltk.download('punkt_tab')
          nltk.download('punkt')
          nltk.download('averaged_perceptron_tagger_eng')
          nltk.download('averaged_perceptron_tagger')
          "

      - name: Run unit & integration tests
        run: |
          poetry run python -m pytest src/tests/ \
            --ignore=src/tests/test_converter_e2e.py \
            --ignore=src/tests/test__e2e_happy_paths.py \
            --ignore=src/tests/test__e2e_unhappy_paths.py \
            -q --tb=short

  # ── End-to-end converter tests (slow, runs in parallel, required to merge) ───
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv + spaCy model
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/nltk_data
          key: venv-v3-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Download spaCy model
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry run python -m spacy download en_core_web_sm

      - name: Download NLTK data
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          poetry run python -c "
          import nltk
          nltk.download('words')
          nltk.download('webtext')
          nltk.download('punkt_tab')
          nltk.download('punkt')
          nltk.download('averaged_perceptron_tagger_eng')
          nltk.download('averaged_perceptron_tagger')
          "

      - name: Run e2e tests
        run: |
          poetry run python -m pytest \
            src/tests/test_converter_e2e.py \
            src/tests/test__e2e_happy_paths.py \
            src/tests/test__e2e_unhappy_paths.py \
            --deselect="src/tests/test__e2e_unhappy_paths.py::test_unhappy_paths::test_no_matches_found" \
            -q --tb=short
